name: GAMMA Locker Release (Code-Only ZIP)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and pytest
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
          # Also install the main dependencies manually if pip [dev] doesn't fetch them
          pip install streamlit pandas numpy pillow altair tqdm

      - name: Run tests
        run: |
          python -m pytest -v tests/test_drafting.py

      - name: Build code-only ZIP
        run: |
          bash release.sh
          ls -lah dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
